<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vector Search Engine{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">
            <i class="fa-solid fa-magnifying-glass-chart"></i> SearchCore
        </div>
        <div>
            <a href="{{ url_for('web.index') }}">Search</a>
            <a href="{{ url_for('web.upload') }}">Upload</a>
            <a href="{{ url_for('web.history') }}">History</a>
        </div>
    </nav>

    <main class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert animate-fade-in" style="background: rgba(56, 189, 248, 0.1); color: var(--accent); padding: 1rem; border-radius: 0.75rem; margin-bottom: 2rem; border: 1px solid var(--accent);">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer style="text-align: center; padding: 4rem 1rem; color: var(--text-secondary); font-size: 0.875rem;">
        &copy; 2026 SearchCore Engine. Powered by TF-IDF & Vectorial Model.
    </footer>
</body>
</html>
